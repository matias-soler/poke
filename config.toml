# poke button → motor mapping.
#
# Fields:
#   motor  "A" | "B" | "C"   NXT output port the arm is plugged into.
#   angle  int (degrees)     Degrees to rotate forward on press.
#   power  int (-100..100)   Drive power. Sign sets press direction.

[buttons.a]
motor = "A"
angle = 5
power = 70


[buttons.b]
motor = "B"
angle = 5
power = 55
